name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
        include:
          - os: windows-latest
            version: '1'
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # The AVX-512 VBMI code path (CodeLUT's `vpermb` permute) only runs on a CPU exposing
  # AVX-512 VBMI. The x86 matrix runners are AVX2-only (AVX-512 turns up only sporadically
  # in GitHub's pool), and NEON is covered by the Apple-Silicon macOS runner — so the matrix
  # above never deterministically exercises AVX-512. Run the suite once more under Intel SDE
  # emulating an Ice Lake CPU so the AVX-512 backend is always executed and covered. The suite
  # forces every host-supported backend, so this job exercises AVX-512 *and* AVX2/Portable.
  #
  # SDE (not QEMU): QEMU's TCG does not implement AVX-512, so an emulated Ice Lake there has no
  # VBMI. SDE is Intel's own ISA emulator — it runs non-AVX-512 code natively and emulates only
  # the AVX-512 instructions, so it is fast. `-follow-execv` makes SDE follow Julia's precompile
  # and test subprocesses, which matters because CodeLUT bakes `HOST_FEATURES` (the CPUID-based
  # backend choice) at *precompile* time — precompilation must see the emulated CPU. The cache
  # action is intentionally omitted here so the precompile happens fresh under SDE. The
  # `GNSS_REQUIRE_BACKENDS` guard fails the job loudly if the emulator stops providing VBMI.
  test-avx512-emulated:
    name: AVX-512 (Intel SDE emulation)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - name: Download Intel SDE
        run: |
          curl -sSL -o sde.tar.xz \
            https://downloadmirror.intel.com/915934/sde-external-10.8.0-2026-03-15-lin.tar.xz
          mkdir -p "$HOME/sde"
          tar -xf sde.tar.xz -C "$HOME/sde" --strip-components=1
          echo "SDE=$HOME/sde/sde64" >> "$GITHUB_ENV"
      - name: Run tests under emulated Ice Lake (AVX-512 VBMI)
        env:
          GNSS_REQUIRE_BACKENDS: avx512vbmi,avx2
          JULIA_NUM_THREADS: '1'
        run: |
          "$SDE" -icx -follow-execv -- \
            julia --project=. --color=yes -e 'using Pkg; Pkg.test("GNSSSignals"; coverage=true)'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}