# Note: the CodeLUT SIMD resampler is per-architecture (AVX-512 / AVX2 / NEON / portable,
# chosen at run time). All four are exercised on CI — AVX2/Portable on the x86 runners, NEON
# on the Apple-Silicon macOS runner, and AVX-512 VBMI under QEMU Ice Lake emulation (see the
# `test-avx512-emulated` job in ci.yml) — so the submodule is fully covered and NOT ignored.
