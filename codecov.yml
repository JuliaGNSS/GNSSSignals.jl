coverage:
  status:
    project:
      default:
        threshold: 3%
    patch:
      default:
        threshold: 3%

# The CodeLUT SIMD code resampler is per-architecture: it ships AVX-512 (vpermb),
# AVX2 (vpshufb), NEON (tbl1) and portable backends, selected at run time from the
# host CPU. The AVX-512 VBMI paths are the bulk of the code, and no GitHub-hosted
# runner exposes AVX-512 VBMI, so they can never execute in CI; the remaining
# arch-specific dispatch (NEON/portable/AVX2 helpers) is likewise spread across
# every file in the submodule. This makes the feature inherently un-coverable on
# CI, so exclude it from coverage rather than gate PRs on coverage we cannot
# produce. Correctness is enforced by the byte-exact oracle tests in test/code_lut.jl.
ignore:
  - "src/code_lut.jl"
  - "src/code_lut/"
